<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻找属于你的灵魂气味</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F3;
            color: #2D2D2D;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: Georgia, serif;
            letter-spacing: 0.05em;
        }
        
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Cover Page */
        .cover-content {
            text-align: center;
            max-width: 1000px;
            position: relative;
            z-index: 10;
        }
        
        .cover-title {
            font-size: 4rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        
        .title-char {
            display: inline-block;
            opacity: 0;
            animation: fadeInChar 0.8s ease-out forwards;
        }
        
        @keyframes fadeInChar {
            from {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }
        
        .decorative-top {
            font-size: 3rem;
            opacity: 0.2;
            margin-bottom: 2rem;
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cover-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }
        
        .divider-line {
            width: 60px;
            height: 1px;
            background: rgba(45, 45, 45, 0.2);
            animation: expandLine 1.2s ease-out 1.5s forwards;
            transform-origin: center;
        }
        
        @keyframes expandLine {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 0.2; }
        }
        
        .divider-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(45, 45, 45, 0.3);
            animation: fadeIn 0.8s ease-out 1.8s forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            to { opacity: 0.3; }
        }
        
        .cover-subtitle {
            font-size: 1rem;
            color: rgba(45, 45, 45, 0.6);
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 3rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 2s forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn {
            padding: 1.5rem 5rem;
            border: 1px solid rgba(45, 45, 45, 0.15);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            color: rgba(45, 45, 45, 0.8);
            font-size: 0.875rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.7s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 2.3s forwards;
        }
        
        .btn:hover {
            border-color: rgba(45, 45, 45, 0.3);
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(45, 45, 45, 0.1);
        }
        
        .cover-brands {
            margin-top: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 0.75rem;
            color: rgba(45, 45, 45, 0.3);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.6s forwards;
        }
        
        .brand-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(45, 45, 45, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        .decorative-bottom {
            margin-top: 3rem;
            font-size: 1.5rem;
            color: rgba(45, 45, 45, 0.1);
            opacity: 0;
            animation: fadeInPulse 1s ease-out 3s forwards;
        }
        
        @keyframes fadeInPulse {
            to { opacity: 1; }
        }
        
        .floating-emoji {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            animation: floatEmoji 8s ease-in-out infinite;
        }
        
        @keyframes floatEmoji {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.1;
            }
            50% {
                transform: translateY(-30px) translateX(20px) rotate(360deg);
                opacity: 0.3;
            }
        }
        
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: breatheOrb 8s ease-in-out infinite;
        }
        
        @keyframes breatheOrb {
            0%, 100% {
                transform: scale(1) translate(0, 0);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.2) translate(30px, -20px);
                opacity: 0.5;
            }
        }
        
        /* Quiz Page */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(45, 45, 45, 0.05);
            z-index: 1000;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, rgba(74, 93, 78, 0.4), rgba(184, 134, 11, 0.5), rgba(74, 93, 78, 0.4));
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        
        .progress-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s linear infinite;
        }
        
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(200%); }
        }
        
        .question-counter {
            position: fixed;
            top: 2rem;
            left: 2rem;
            font-size: 0.75rem;
            color: rgba(45, 45, 45, 0.3);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            z-index: 100;
            font-weight: 300;
        }
        
        .quiz-content {
            max-width: 1000px;
            width: 100%;
        }
        
        .question-emoji {
            text-align: center;
            font-size: 5rem;
            margin-bottom: 2.5rem;
            animation: emojiFloat 3s ease-in-out infinite;
        }
        
        @keyframes emojiFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-12px) rotate(5deg);
            }
            75% {
                transform: translateY(-12px) rotate(-5deg);
            }
        }
        
        .question-text {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 5rem;
            line-height: 1.4;
            letter-spacing: 0.02em;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .option {
            padding: 1.5rem 2rem;
            border: 1px solid rgba(45, 45, 45, 0.08);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            text-align: left;
        }
        
        .option:hover {
            border-color: rgba(45, 45, 45, 0.15);
            background: rgba(255, 255, 255, 0.5);
            transform: translateX(8px);
        }
        
        .option-letter {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(45, 45, 45, 0.15);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            font-size: 0.75rem;
            color: rgba(45, 45, 45, 0.4);
            transition: all 0.3s ease;
            font-weight: 300;
        }
        
        .option:hover .option-letter {
            border-color: rgba(45, 45, 45, 0.25);
            color: rgba(45, 45, 45, 0.6);
        }
        
        .option-text {
            font-size: 1.125rem;
            color: rgba(45, 45, 45, 0.7);
            font-weight: 300;
            flex: 1;
            letter-spacing: 0.02em;
        }
        
        .option:hover .option-text {
            color: #2D2D2D;
        }
        
        .option-emoji {
            font-size: 1.5rem;
            margin-left: 1rem;
            transition: transform 0.3s ease;
        }
        
        .option:hover .option-emoji {
            transform: scale(1.2) rotate(10deg);
        }
        
        /* Loading Page with Spray Animation */
        .loading-content {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        .bottle-container {
            margin-bottom: 4rem;
            position: relative;
        }
        
        .bottle {
            width: 120px;
            height: 160px;
            margin: 0 auto;
            position: relative;
        }
        
        .spray-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(74, 93, 78, 0.4);
            animation: sprayOut 1.5s ease-out infinite;
        }
        
        @keyframes sprayOut {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.3);
                opacity: 0;
            }
        }
        
        .spray-mist {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 93, 78, 0.2), transparent);
            animation: mistExpand 2s ease-out infinite;
        }
        
        @keyframes mistExpand {
            0% {
                transform: translateX(-50%) scale(0.5);
                opacity: 0.6;
            }
            100% {
                transform: translateX(-50%) scale(2);
                opacity: 0;
            }
        }
        
        .loading-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            letter-spacing: 0.02em;
        }
        
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(45, 45, 45, 0.3);
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.4);
            }
        }
        
        .loading-subtitle {
            font-size: 0.875rem;
            color: rgba(45, 45, 45, 0.4);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        
        .smoke {
            position: absolute;
            border-radius: 50%;
            background: rgba(45, 45, 45, 0.05);
            filter: blur(60px);
            animation: smokeRise 3s ease-out infinite;
        }
        
        @keyframes smokeRise {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.3;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-80px) scale(1.5);
                opacity: 0;
            }
        }
        
        /* Result Page */
        .result-content {
            max-width: 1200px;
            width: 100%;
        }
        
        .result-bottle {
            text-align: center;
            margin-bottom: 4rem;
            animation: bottleFloat 4s ease-in-out infinite;
        }
        
        @keyframes bottleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .result-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(45, 45, 45, 0.3);
            margin-bottom: 1.5rem;
            font-weight: 300;
        }
        
        .result-name {
            font-size: 4rem;
            margin-bottom: 1rem;
            letter-spacing: 0.03em;
        }
        
        .result-brand {
            font-size: 1.5rem;
            color: rgba(45, 45, 45, 0.5);
            font-weight: 300;
            letter-spacing: 0.03em;
        }
        
        .result-description {
            text-align: center;
            font-size: 1.25rem;
            color: rgba(45, 45, 45, 0.7);
            line-height: 1.8;
            margin-bottom: 3rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
            letter-spacing: 0.02em;
            position: relative;
            padding: 0 2rem;
        }
        
        .result-description::before {
            content: '"';
            position: absolute;
            left: -1rem;
            top: 0;
            font-size: 4rem;
            color: rgba(45, 45, 45, 0.05);
            font-family: Georgia, serif;
        }
        
        .result-description::after {
            content: '"';
            position: absolute;
            right: -1rem;
            bottom: 0;
            font-size: 4rem;
            color: rgba(45, 45, 45, 0.05);
            font-family: Georgia, serif;
        }
        
        .poetic-description {
            text-align: center;
            font-size: 1.1rem;
            color: rgba(45, 45, 45, 0.65);
            line-height: 2;
            margin-bottom: 5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
            letter-spacing: 0.03em;
            font-style: italic;
        }
        
        .notes-section-title {
            text-align: center;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(45, 45, 45, 0.4);
            margin-bottom: 3rem;
            font-weight: 300;
        }
        
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            margin-bottom: 5rem;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .note-section {
            text-align: center;
        }
        
        .note-icon {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(45, 45, 45, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            transition: all 0.5s ease;
        }
        
        .note-section:hover .note-icon {
            border-color: rgba(45, 45, 45, 0.2);
            transform: scale(1.05);
        }
        
        .note-title {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(45, 45, 45, 0.4);
            margin-bottom: 1rem;
            font-weight: 300;
        }
        
        .note-list {
            list-style: none;
        }
        
        .note-list li {
            color: rgba(45, 45, 45, 0.6);
            font-weight: 300;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            letter-spacing: 0.02em;
        }
        
        .attributes-title {
            text-align: center;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(45, 45, 45, 0.4);
            margin-bottom: 2rem;
            font-weight: 300;
        }
        
        .attributes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .attribute-tag {
            padding: 0.5rem 1.25rem;
            border: 1px solid rgba(45, 45, 45, 0.1);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            font-size: 0.75rem;
            color: rgba(45, 45, 45, 0.5);
            letter-spacing: 0.15em;
            transition: all 0.5s ease;
            font-weight: 300;
        }
        
        .attribute-tag:hover {
            border-color: rgba(45, 45, 45, 0.2);
            color: rgba(45, 45, 45, 0.7);
            transform: scale(1.05) translateY(-2px);
        }
        
        .scenes-title {
            text-align: center;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(45, 45, 45, 0.4);
            margin-bottom: 1.5rem;
            font-weight: 300;
        }
        
        .scenes {
            text-align: center;
            font-size: 0.875rem;
            color: rgba(45, 45, 45, 0.6);
            font-weight: 300;
            margin-bottom: 5rem;
            letter-spacing: 0.02em;
        }
        
        .result-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 4rem;
        }
        
        .result-footer {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(45, 45, 45, 0.3);
            letter-spacing: 0.15em;
            font-weight: 300;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .cover-title { font-size: 2.5rem; }
            .question-text { font-size: 1.75rem; }
            .result-name { font-size: 2.5rem; }
            .notes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Cover Page -->
    <div id="coverPage" class="page">
        <div class="gradient-orb" style="top: 25%; right: 25%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(74, 93, 78, 0.1), transparent);"></div>
        <div class="gradient-orb" style="bottom: 25%; left: 25%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(184, 134, 11, 0.1), transparent); animation-delay: 1s;"></div>
        
        <div class="floating-emoji" style="left: 15%; top: 20%; animation-delay: 0s;">✨</div>
        <div class="floating-emoji" style="left: 30%; top: 35%; animation-delay: 0.5s;">🌸</div>
        <div class="floating-emoji" style="right: 20%; top: 25%; animation-delay: 1s;">🍃</div>
        <div class="floating-emoji" style="right: 35%; top: 50%; animation-delay: 1.5s;">💫</div>
        <div class="floating-emoji" style="left: 25%; bottom: 30%; animation-delay: 2s;">🌿</div>
        <div class="floating-emoji" style="right: 25%; bottom: 35%; animation-delay: 2.5s;">🪷</div>
        
        <div class="cover-content">
            <div class="decorative-top">✦</div>
            <h1 class="cover-title" id="coverTitle"></h1>
            <div class="cover-divider">
                <div class="divider-line"></div>
                <div class="divider-dot"></div>
                <div class="divider-line"></div>
            </div>
            <p class="cover-subtitle">
                每一种香气都是一段故事的开始<br>
                让我们通过二十五个问题，为你找到那个独特的嗅觉印记
            </p>
            <button class="btn" onclick="startQuiz()">开始探索</button>
            <div class="cover-brands">
                <span>Diptyque</span>
                <span class="brand-dot"></span>
                <span>L'Artisan</span>
                <span class="brand-dot"></span>
                <span>Le Labo</span>
                <span class="brand-dot"></span>
                <span>Aesop</span>
            </div>
            <div class="decorative-bottom">◇</div>
        </div>
    </div>

    <!-- Quiz Page -->
    <div id="quizPage" class="page hidden">
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%">
                <div class="progress-shimmer"></div>
            </div>
        </div>
        <div id="questionCounter" class="question-counter">01 / 25</div>
        <div class="quiz-content">
            <div id="questionEmoji" class="question-emoji"></div>
            <h2 id="questionText" class="question-text"></h2>
            <div id="optionsContainer" class="options"></div>
        </div>
    </div>

    <!-- Loading Page with Spray Animation -->
    <div id="loadingPage" class="page hidden">
        <div class="smoke" style="width: 150px; height: 150px; left: 30%; top: 40%; animation-delay: 0s;"></div>
        <div class="smoke" style="width: 200px; height: 200px; right: 25%; top: 35%; animation-delay: 0.4s;"></div>
        <div class="smoke" style="width: 180px; height: 180px; left: 35%; bottom: 30%; animation-delay: 0.8s;"></div>
        <div class="smoke" style="width: 220px; height: 220px; right: 30%; bottom: 35%; animation-delay: 1.2s;"></div>
        
        <div class="loading-content">
            <div class="bottle-container">
                <svg class="bottle" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="35" y="10" width="30" height="20" stroke="rgba(45, 45, 45, 0.15)" stroke-width="0.5"/>
                    <path d="M 38 30 L 38 45 L 25 50 L 25 125 L 75 125 L 75 50 L 62 45 L 62 30 Z" 
                          stroke="rgba(45, 45, 45, 0.15)" stroke-width="0.5" fill="none"/>
                    <rect x="27" y="90" width="46" height="33" fill="rgba(45, 45, 45, 0.1)"/>
                </svg>
                
                <!-- Spray Mist -->
                <div class="spray-mist"></div>
                
                <!-- Spray Particles -->
                <div id="sprayParticles"></div>
            </div>
            <h2 class="loading-title">正在调配你的专属香气</h2>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <p class="loading-subtitle">分析气质维度</p>
        </div>
    </div>

    <!-- Result Page -->

            // Create spray particles
            createSprayParticles();

        function createSprayParticles() {
            const container = document.getElementById('sprayParticles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'spray-particle';
                const angle = (Math.random() * 120 - 60) * Math.PI / 180;
                const distance = 40 + Math.random() * 60;
                const tx = Math.cos(angle) * distance;
                const ty = -Math.abs(Math.sin(angle)) * distance - 20;
                particle.style.cssText = `
                    left: 50%;
                    top: 30%;
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    animation-delay: ${Math.random() * 1.5}s;
                `;
                container.appendChild(particle);
            }

            personality: {},

        function startQuiz() {
            document.getElementById('coverPage').classList.add('hidden');
            document.getElementById('quizPage').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('questionEmoji').textContent = question.emoji;
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('questionCounter').textContent = 
                `${String(currentQuestion + 1).padStart(2, '0')} / ${questions.length}`;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.innerHTML = `
                    <span class="option-letter">${String.fromCharCode(65 + index)}</span>
                    <span class="option-text">${option.text} ${option.emoji}</span>
                `;
                optionEl.onclick = () => selectOption(option);
                container.appendChild(optionEl);
            });
        }

        function selectOption(option) {
            // Record attributes
            Object.keys(option.attrs).forEach(category => {
                option.attrs[category].forEach(attr => {
                    userAttributes[category][attr] = (userAttributes[category][attr] || 0) + 1;
                });
            });
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showLoading();
            }
        }

        function showLoading() {
            document.getElementById('quizPage').classList.add('hidden');
            document.getElementById('loadingPage').classList.remove('hidden');
            
            setTimeout(() => {
                calculateResult();
            }, 3000);
        }

        function calculateResult() {
            let bestMatch = null;
            let highestScore = -1;
            
            perfumes.forEach(perfume => {
                let score = 0;
                
                Object.keys(perfume.match).forEach(category => {
                    perfume.match[category].forEach(attr => {
                        score += userAttributes[category][attr] || 0;
                    });
                });
                
                if (score > highestScore) {
                    highestScore = score;
                    bestMatch = perfume;
                }
            });
            
            showResult(bestMatch);
        }

        function showResult(perfume) {
            document.getElementById('loadingPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            
            document.getElementById('resultName').textContent = perfume.name;
            document.getElementById('resultBrand').textContent = perfume.brand;
            document.getElementById('resultDescription').textContent = perfume.description;
            document.getElementById('poeticDescription').textContent = perfume.poetry;
            
            const topNotes = document.getElementById('topNotes');
            topNotes.innerHTML = '';
            perfume.notes.top.forEach(note => {
                const li = document.createElement('li');
                li.textContent = note;
                topNotes.appendChild(li);
            });
            
            const middleNotes = document.getElementById('middleNotes');
            middleNotes.innerHTML = '';
            perfume.notes.middle.forEach(note => {
                const li = document.createElement('li');
                li.textContent = note;
                middleNotes.appendChild(li);
            });
            
            const baseNotes = document.getElementById('baseNotes');
            baseNotes.innerHTML = '';
            perfume.notes.base.forEach(note => {
                const li = document.createElement('li');
                li.textContent = note;
                baseNotes.appendChild(li);
            });
            
            const attributesContainer = document.getElementById('attributesContainer');
            attributesContainer.innerHTML = '';
            perfume.attributes.forEach(attr => {
                const tag = document.createElement('div');
                tag.className = 'attribute-tag';
                tag.textContent = attr;
                attributesContainer.appendChild(tag);
            });
            
            document.getElementById('scenesContainer').textContent = perfume.scenes;
        }

        function restart() {
            currentQuestion = 0;
            userAttributes = {

                texture: {}
